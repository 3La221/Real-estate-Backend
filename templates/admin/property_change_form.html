{% extends "admin/change_form.html" %}

{% block extrahead %}
{{ block.super }}
<script>
(function($) {
    $(document).ready(function() {
        const $wilaya = $('#id_wilaya');
        const $commune = $('#id_commune');

        function populateCommunes(wilayaId, selectedCommuneId) {
            if (!wilayaId) {
                $commune.empty().append(new Option('---------', '', false, false)).prop('disabled', true).trigger('change');
                return;
            }
            fetch(`/admin/get_communes/${wilayaId}/`)
                .then(r => r.json())
                .then(data => {
                    $commune.empty();
                    $commune.append(new Option('---------', '', false, false));
                    data.forEach(function(c) {
                        const isSelected = selectedCommuneId && String(c.id) === String(selectedCommuneId);
                        $commune.append(new Option(c.name, c.id, isSelected, isSelected));
                    });
                    $commune.prop('disabled', false).trigger('change');
                })
                .catch(err => console.error("Failed to load communes:", err));
        }

        // Initialize commune as a basic Select2 for searchability
        // (Select2 JS is already loaded because wilaya is an autocomplete field)
        $commune.select2({
            placeholder: 'Select a commune',
            allowClear: true,
            width: '100%'
        });

        // Poll until the wilaya autocomplete (Select2) is ready
        const interval = setInterval(function() {
            if ($wilaya.hasClass('select2-hidden-accessible')) {
                clearInterval(interval);

                const initialWilaya = $wilaya.val();
                const initialCommune = $commune.val();

                if (initialWilaya) {
                    populateCommunes(initialWilaya, initialCommune);
                } else {
                    $commune.prop('disabled', true).trigger('change');
                }

                $wilaya.on('select2:select', function(e) {
                    populateCommunes(e.params.data.id, null);
                });

                $wilaya.on('select2:clear', function() {
                    populateCommunes(null, null);
                });
            }
        }, 100);
    });
})(django.jQuery);
</script>
{% endblock %}
