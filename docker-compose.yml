version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: realestate-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - realestate-network

  web:
    image: brahimi3109/mibrat:realestate-api
    container_name: realestate-web
    restart: unless-stopped
    ports:
      - "8899:8000"
    env_file:
      - .env
    volumes:
      - ./db.sqlite3:/app/db.sqlite3
      - staticfiles:/app/staticfiles
      - media:/app/media
      - logs:/app/logs
    depends_on:
      - redis
    networks:
      - realestate-network
    entrypoint: ["/bin/bash", "/app/docker-entrypoint.sh"]

  celery-worker:
    image: brahimi3109/mibrat:realestate-api
    container_name: realestate-celery-worker
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./db.sqlite3:/app/db.sqlite3
      - logs:/app/logs
    depends_on:
      - redis
      - web
    networks:
      - realestate-network
    command: celery -A config worker -l INFO --concurrency=2

  celery-beat:
    image: brahimi3109/mibrat:realestate-api
    container_name: realestate-celery-beat
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./db.sqlite3:/app/db.sqlite3
      - logs:/app/logs
    depends_on:
      - redis
      - web
    networks:
      - realestate-network
    command: celery -A config beat -l INFO --scheduler django_celery_beat.schedulers:DatabaseScheduler

volumes:
  redis_data:
  staticfiles:
  media:
  logs:

networks:
  realestate-network:
    driver: bridge